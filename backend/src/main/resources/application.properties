# Server
server.port=8080

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/interviewintel}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# Reddit API
reddit.client.id=${REDDIT_CLIENT_ID}
reddit.client.secret=${REDDIT_CLIENT_SECRET}
reddit.user.agent=InterviewIntel/1.0 by YourUsername

# Claude API
claude.api.key=${CLAUDE_API_KEY}
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-sonnet-4-20250514

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000}

# Logging
logging.level.com.interviewintel=INFO
logging.level.org.springframework.web=WARN
